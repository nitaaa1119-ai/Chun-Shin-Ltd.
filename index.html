<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忠欣 · 打勾單系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --ink:       #0f0f10;
  --ink2:      #4b5563;
  --ink3:      #9ca3af;
  --line:      #e5e7eb;
  --line2:     #f3f4f6;
  --white:     #ffffff;
  --page:      #f9fafb;
  --sidebar-w: 220px;

  --red:       #ef4444;
  --red-bg:    #fff1f2;
  --red-bd:    #fecdd3;
  --red-dk:    #9f1239;

  --grn:       #10b981;
  --grn-bg:    #ecfdf5;
  --grn-bd:    #a7f3d0;
  --grn-dk:    #065f46;

  --blu:       #3b82f6;
  --blu-bg:    #eff6ff;
  --blu-bd:    #bfdbfe;
  --blu-dk:    #1e3a8a;

  --amber:     #f59e0b;
  --amber-bg:  #fffbeb;
  --amber-bd:  #fde68a;
  --amber-dk:  #78350f;

  --accent:    #6366f1;   /* indigo — signature colour */
  --accent-bg: #eef2ff;
  --accent-lt: #c7d2fe;

  --radius:  14px;
  --r-sm:    8px;
  --r-xs:    5px;
  --shadow:  0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 24px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
  background: var(--page);
  color: var(--ink);
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════════════ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  height: 56px;
  background: var(--white);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; padding: 0 20px;
  gap: 16px;
  box-shadow: 0 1px 0 var(--line);
}
.brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.brand-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
  letter-spacing: -.5px;
  flex-shrink: 0;
}
.brand-name {
  font-size: 15px; font-weight: 700; color: var(--ink);
  letter-spacing: -.3px;
}
.brand-sub {
  font-size: 11px; color: var(--ink3); font-weight: 400;
}
.topbar-date {
  font-size: 12px; color: var(--ink3);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}
.user-tag {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent-bg);
  border: 1px solid var(--accent-lt);
  border-radius: var(--r-sm);
  padding: 4px 10px;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.user-tag:hover { background: #e0e7ff; }
.user-tag-avatar {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--accent-bg);
  border: 1px solid var(--accent-lt);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.user-tag-name {
  font-size: 12px; font-weight: 600; color: var(--accent);
}
/* 暱稱設定 Modal */
.user-modal {
  background: var(--white); border-radius: 18px;
  width: 90%; max-width: 320px; padding: 24px;
  box-shadow: var(--shadow-lg);
  transform: scale(.94) translateY(8px);
  transition: transform .2s cubic-bezier(.34,1.56,.64,1);
}
.overlay.open .user-modal { transform: scale(1) translateY(0); }
.user-modal-title {
  font-size: 15px; font-weight: 700; color: var(--ink);
  margin-bottom: 6px;
}
.user-modal-sub {
  font-size: 12px; color: var(--ink3); margin-bottom: 16px;
}
.user-name-input {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--line); border-radius: var(--r-sm);
  font-size: 16px; font-weight: 600; color: var(--ink);
  background: var(--page); outline: none; text-align: center;
  letter-spacing: .04em;
  transition: border-color .15s, box-shadow .15s;
}
.user-name-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,.12);
  background: var(--white);
}
.user-icon-row {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; margin: 14px 0;
}
.user-icon-btn {
  width: 40px; height: 40px; border-radius: var(--r-sm);
  border: 2px solid var(--line); background: var(--page);
  cursor: pointer; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  transition: transform .12s, border-color .12s, background .12s;
}
.user-icon-btn:hover { transform: scale(1.15); background: var(--line2); }
.user-icon-btn.selected {
  border-color: var(--accent); background: var(--accent-bg);
  transform: scale(1.1);
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--grn);
  flex-shrink: 0;
  transition: background .3s;
}
.sync-dot.syncing { background: var(--amber); animation: pulse-dot 1s infinite; }
.sync-dot.error   { background: var(--red); }
@keyframes pulse-dot {
  0%,100% { opacity: 1; } 50% { opacity: .3; }
}

/* ═══════════════════════════════════════════════════
   STAT STRIP
═══════════════════════════════════════════════════ */
.statstrip {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  padding: 0 20px;
  display: flex; align-items: stretch; gap: 0;
  overflow-x: auto;
}
.stat-item {
  display: flex; flex-direction: column; justify-content: center;
  padding: 10px 20px 10px 0;
  margin-right: 20px;
  border-right: 1px solid var(--line);
  white-space: nowrap;
  min-width: 80px;
}
.stat-item:last-child { border-right: none; margin-right: 0; padding-right: 0; }
.stat-label-row {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--ink3); font-weight: 500;
  margin-bottom: 2px;
}
.stat-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.stat-dot.red    { background: var(--red); }
.stat-dot.green  { background: var(--grn); }
.stat-dot.blue   { background: var(--blu); }
.stat-dot.amber  { background: var(--amber); }
.stat-dot.gray   { background: var(--ink3); }
.stat-number {
  font-size: 22px; font-weight: 800; color: var(--ink);
  letter-spacing: -.5px; line-height: 1;
}
.progress-stat {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
  padding-left: 20px;
}
.prog-track {
  width: 100px; height: 5px;
  background: var(--line2); border-radius: 99px; overflow: hidden;
}
.prog-fill {
  height: 100%; background: var(--grn);
  border-radius: 99px; transition: width .5s ease;
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--grn); min-width: 38px; }

/* ═══════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════ */
.tabs {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  padding: 0 20px;
  display: flex;
}
.tab {
  padding: 0 16px;
  height: 44px;
  line-height: 44px;
  font-size: 13px; font-weight: 500;
  color: var(--ink3);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.tab:hover { color: var(--ink2); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ═══════════════════════════════════════════════════
   PAGE SHELL
═══════════════════════════════════════════════════ */
.page { display: none; flex: 1; }
.page.active { display: block; }

/* ═══════════════════════════════════════════════════
   TOOLBAR
═══════════════════════════════════════════════════ */
.toolbar {
  padding: 12px 20px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  border-bottom: 1px solid var(--line2);
  background: var(--white);
}
.search-box {
  position: relative; flex: 1; min-width: 150px; max-width: 280px;
}
.search-box input {
  width: 100%;
  padding: 7px 12px 7px 34px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink);
  background: var(--page);
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.search-box input:focus {
  background: var(--white);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,.12);
}
.search-box input::placeholder { color: var(--ink3); }
.search-ico {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--ink3); font-size: 13px; pointer-events: none;
}
.filter-select {
  padding: 7px 10px;
  border: 1px solid var(--line); border-radius: var(--r-sm);
  font-size: 13px; background: var(--page); color: var(--ink);
  outline: none; cursor: pointer;
  transition: border-color .15s;
}
.filter-select:focus { border-color: var(--accent); }

/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500;
  border: none; cursor: pointer;
  transition: all .14s; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 1px 3px rgba(99,102,241,.3);
}
.btn-primary:hover { background: #4f46e5; }
.btn-ghost {
  background: var(--white); color: var(--ink2);
  border: 1px solid var(--line);
}
.btn-ghost:hover { background: var(--line2); color: var(--ink); }
.btn-danger { background: var(--red-bg); color: var(--red-dk); border: 1px solid var(--red-bd); }
.btn-danger:hover { background: #ffe4e6; }
.btn-reset {
  background: #fff7ed; color: #c2410c;
  border: 1px solid #fed7aa;
}
.btn-reset:hover { background: #ffedd5; }
.btn-date {
  background: #f0fdf4; color: #166534;
  border: 1px solid #bbf7d0;
}
.btn-date:hover { background: #dcfce7; }
.btn-sm { padding: 5px 9px; font-size: 12px; }
.ml-auto { margin-left: auto; }

/* ═══════════════════════════════════════════════════
   WARN BANNER
═══════════════════════════════════════════════════ */
.warn-strip {
  display: none;
  margin: 14px 20px 0;
  background: var(--amber-bg);
  border: 1px solid var(--amber-bd);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13px; color: var(--amber-dk); font-weight: 500;
  gap: 8px; align-items: flex-start;
}
.warn-strip.visible { display: flex; }
.warn-strip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.warn-strip-names { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.warn-chip {
  background: #fff; border: 1px solid var(--amber-bd);
  color: var(--amber-dk); border-radius: var(--r-xs);
  font-size: 12px; font-weight: 600; padding: 2px 7px;
}

/* ═══════════════════════════════════════════════════
   HINT BAR
═══════════════════════════════════════════════════ */
.hint-bar {
  padding: 6px 20px;
  font-size: 11px; color: var(--ink3);
  border-bottom: 1px solid var(--line2);
  background: var(--page);
}

/* ═══════════════════════════════════════════════════
   GRID + CARDS
═══════════════════════════════════════════════════ */
.group-section { padding: 0 20px 20px; }
.group-label {
  font-size: 11px; font-weight: 600; color: var(--ink3);
  letter-spacing: .08em; text-transform: uppercase;
  padding: 18px 0 9px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.group-count {
  background: var(--line2); color: var(--ink3);
  font-size: 10px; padding: 2px 7px; border-radius: 99px;
  font-weight: 600; letter-spacing: .04em;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 7px;
}

.ccard {
  position: relative;
  padding: 11px 10px 9px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px; font-weight: 600;
  display: flex; flex-direction: column; gap: 5px;
  min-height: 60px;
  transition: transform .12s, box-shadow .12s, border-color .12s;
  border: 1.5px solid transparent;
  user-select: none;
}
.ccard:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.ccard:active { transform: scale(.96); }

.ccard.unordered { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red-dk); }
.ccard.ordered   { background: var(--grn-bg);   border-color: var(--grn-bd);   color: var(--grn-dk); }
.ccard.no-order  { background: var(--blu-bg);   border-color: var(--blu-bd);   color: var(--blu-dk); }
.ccard.warn3     {
  background: #fefce8; border-color: #fbbf24; color: #78350f;
  border-left: 4px solid #f59e0b;
  animation: warn-pulse 2.6s ease-in-out infinite;
}
@keyframes warn-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,.2); }
  50%      { box-shadow: 0 0 0 5px rgba(245,158,11,.06); }
}

.ccard-name { line-height: 1.25; word-break: break-all; }
.ccard-foot {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-weight: 400; opacity: .7;
}
.ccard-dot {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}
.unordered .ccard-dot { background: var(--red); }
.ordered   .ccard-dot { background: var(--grn); }
.no-order  .ccard-dot { background: var(--blu); }
.warn3     .ccard-dot { background: var(--amber); }

.warn3-badge {
  position: absolute; top: 5px; right: 24px;
  font-size: 9px; font-weight: 700; letter-spacing: .03em;
  background: #f59e0b; color: #fff;
  padding: 2px 6px; border-radius: 99px;
  pointer-events: none;
  box-shadow: 0 1px 3px rgba(245,158,11,.4);
}
.edit-btn {
  position: absolute; top: 5px; right: 5px;
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(0,0,0,.07);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; opacity: 0;
  transition: opacity .15s; cursor: pointer;
  border: none; color: inherit;
}
.ccard:hover .edit-btn { opacity: 1; }

/* ═══════════════════════════════════════════════════
   BACKEND TABLE
═══════════════════════════════════════════════════ */
.table-wrap { padding: 0 20px 28px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: 9px 12px;
  text-align: left; font-size: 11px; font-weight: 600;
  color: var(--ink3); letter-spacing: .05em;
  border-bottom: 1px solid var(--line);
  background: var(--page);
  white-space: nowrap;
}
tbody td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--line2);
  color: var(--ink); vertical-align: middle;
}
tbody tr:hover td { background: var(--line2); }
tbody tr.row-warn td { background: #fffbeb; }
tbody tr.row-warn:hover td { background: #fef3c7; }

.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 600;
}
.badge.unordered { background: var(--red-bg);   color: var(--red-dk); }
.badge.ordered   { background: var(--grn-bg);   color: var(--grn-dk); }
.badge.no-order  { background: var(--blu-bg);   color: var(--blu-dk); }
.badge.warn3     { background: var(--amber-bg); color: var(--amber-dk); border: 1px solid var(--amber-bd); }

/* timeline */
.tl-list { list-style: none; display: flex; flex-direction: column; gap: 2px; min-width: 170px; }
.tl-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink2); }
.tl-dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.tl-dot.ordered   { background: var(--grn); }
.tl-dot.no-order  { background: var(--blu); }
.tl-dot.unordered { background: var(--red); }
.tl-time   { font-variant-numeric: tabular-nums; color: var(--ink3); min-width: 38px; }
.tl-status { font-weight: 500; }
.tl-empty  { font-size: 11px; color: var(--ink3); font-style: italic; }

.warn-pill {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--amber-bg); border: 1px solid var(--amber-bd);
  color: var(--amber-dk); border-radius: var(--r-xs);
  font-size: 11px; font-weight: 600; padding: 2px 7px;
}

/* ═══════════════════════════════════════════════════
   PRINT PAGE
═══════════════════════════════════════════════════ */
.print-wrap { padding: 0 20px 28px; }
.print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.print-table th, .print-table td { border: 1px solid #000; padding: 3px 4px; text-align: center; }
.print-table td.name-cell { font-weight: 600; text-align: left; padding-left: 6px; white-space: nowrap; }
.print-table td.name-cell.name-warn { background: #fffbeb; color: var(--amber-dk); }

/* ═══════════════════════════════════════════════════
   SECTION INFO
═══════════════════════════════════════════════════ */
.section-info {
  padding: 7px 20px;
  background: var(--line2); border-bottom: 1px solid var(--line);
  font-size: 11px; color: var(--ink2);
  display: flex; align-items: center; gap: 6px;
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: #fff;
  padding: 10px 18px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  z-index: 999; pointer-events: none; white-space: nowrap;
  box-shadow: var(--shadow-lg);
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════════════
   MODAL / OVERLAY
═══════════════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.30);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .18s;
  backdrop-filter: blur(3px);
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--white); border-radius: 18px;
  width: 90%; max-width: 400px; padding: 24px;
  box-shadow: var(--shadow-lg);
  transform: scale(.94) translateY(8px);
  transition: transform .2s cubic-bezier(.34,1.56,.64,1);
}
.overlay.open .modal { transform: scale(1) translateY(0); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--ink); }
.field { margin-bottom: 13px; }
.field label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--ink2); margin-bottom: 5px; letter-spacing: .04em; text-transform: uppercase;
}
.field input, .field select {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--line); border-radius: var(--r-sm);
  font-size: 14px; color: var(--ink); background: var(--page);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,.12);
  background: var(--white);
}
.modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
.modal-actions-left { margin-right: auto; }

/* ═══════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════ */
.empty { padding: 56px 24px; text-align: center; color: var(--ink3); font-size: 14px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════
   DRAG & DROP
═══════════════════════════════════════════════════ */
.ccard[draggable="true"] { cursor: grab; }
.ccard[draggable="true"]:active { cursor: grabbing; }
.ccard.dragging {
  opacity: .35;
  transform: scale(.96);
  box-shadow: none !important;
}
.ccard.drag-over {
  outline: 2px dashed var(--accent);
  outline-offset: 2px;
}
.drag-mode-hint {
  display: none;
  align-items: center; gap: 6px;
  padding: 5px 12px;
  background: var(--accent-bg);
  border: 1px solid var(--accent-lt);
  border-radius: var(--r-sm);
  font-size: 12px; color: var(--accent); font-weight: 500;
  white-space: nowrap;
}
.drag-mode-active .drag-mode-hint { display: flex; }
.drag-mode-active .ccard { cursor: grab; }
.drag-toggle-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: var(--r-sm);
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--line); background: var(--white); color: var(--ink2);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.drag-toggle-btn.active {
  background: var(--accent-bg); border-color: var(--accent-lt); color: var(--accent);
}
.drag-toggle-btn:hover { background: var(--line2); }
.drag-toggle-btn.active:hover { background: #e0e7ff; }

/* ═══════════════════════════════════════════════════
   NOTICE BOARD
═══════════════════════════════════════════════════ */
.notice-board {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  overflow: hidden;
}
.notice-board-header {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.notice-board-header:hover { background: var(--line2); }
.notice-board-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: .06em; white-space: nowrap;
  flex-shrink: 0;
}
.notice-badge {
  background: var(--red); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: 99px;
  min-width: 16px; text-align: center;
  display: none;
}
.notice-badge.visible { display: inline-block; }
.notice-preview {
  flex: 1; font-size: 12px; color: var(--ink3);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  min-width: 0;
}
.notice-chevron {
  font-size: 10px; color: var(--ink3);
  transition: transform .2s; flex-shrink: 0;
}
.notice-board.open .notice-chevron { transform: rotate(180deg); }
.notice-body {
  display: none;
  padding: 0 20px 12px;
  border-top: 1px solid var(--line2);
}
.notice-board.open .notice-body { display: block; }
.notice-ticker {
  overflow: hidden; position: relative;
  min-height: 28px; margin-bottom: 8px;
}
.notice-list {
  list-style: none;
  display: flex; flex-direction: column; gap: 0;
  width: 100%;
}
.notice-item {
  display: flex; align-items: baseline; gap: 8px;
  font-size: 13px; color: var(--ink);
  padding: 2px 0;
  border-bottom: 1px solid var(--line2);
  animation: slide-in .25s ease;
}
.notice-item:last-child { border-bottom: none; }
@keyframes slide-in {
  from { opacity:0; transform: translateY(-4px); }
  to   { opacity:1; transform: translateY(0); }
}
.notice-author {
  font-size: 11px; font-weight: 700; color: var(--accent);
  flex-shrink: 0; min-width: 36px;
}
.notice-time {
  font-size: 10px; color: var(--ink3);
  flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.notice-text { flex: 1; line-height: 1.4; word-break: break-all; }
.notice-del {
  font-size: 11px; color: var(--ink3); cursor: pointer;
  background: none; border: none; padding: 0 2px;
  opacity: 0; transition: opacity .15s;
  flex-shrink: 0;
}
.notice-item:hover .notice-del { opacity: 1; }
.notice-del:hover { color: var(--red); }
.notice-input-wrap {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}
.notice-input {
  padding: 5px 10px;
  border: 1px solid var(--line); border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink); background: var(--page);
  outline: none; flex: 1; min-width: 120px;
  transition: border-color .15s, box-shadow .15s;
}
.notice-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,.1);
  background: var(--white);
}
.notice-send {
  padding: 5px 12px; border-radius: var(--r-sm);
  font-size: 12px; font-weight: 600;
  background: var(--accent); color: #fff;
  border: none; cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.notice-send:hover { background: #4f46e5; }
.notice-empty {
  font-size: 12px; color: var(--ink3); font-style: italic;
}
.notice-author-input {
  padding: 5px 8px;
  border: 1px solid var(--line); border-radius: var(--r-sm);
  font-size: 12px; color: var(--ink); background: var(--page);
  outline: none; width: 68px;
  transition: border-color .15s;
}
.notice-author-input:focus { border-color: var(--accent); }

/* ═══════════════════════════════════════════════════
   ANALYTICS PAGE
═══════════════════════════════════════════════════ */
.analytics-wrap {
  padding: 20px;
}
.analytics-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
}
.analytics-title {
  font-size: 15px; font-weight: 700; color: var(--ink);
}
.analytics-month-nav {
  display: flex; align-items: center; gap: 8px;
}
.month-btn {
  width: 30px; height: 30px; border-radius: var(--r-sm);
  border: 1px solid var(--line); background: var(--white);
  cursor: pointer; font-size: 14px; color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.month-btn:hover { background: var(--line2); }
.month-label {
  font-size: 14px; font-weight: 600; color: var(--ink);
  min-width: 80px; text-align: center;
}
.analytics-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.analytics-card-title {
  font-size: 12px; font-weight: 600; color: var(--ink3);
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 16px;
}
.chart-legend {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--ink2);
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
/* SVG 折線圖容器 */
.chart-svg-wrap {
  width: 100%; overflow-x: auto;
}
.chart-svg-wrap svg {
  display: block; min-width: 320px;
}
/* 今日摘要卡片 */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.summary-card {
  background: var(--page);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 12px 14px;
}
.summary-card-label {
  font-size: 11px; color: var(--ink3); font-weight: 500;
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 4px;
}
.summary-card-val {
  font-size: 26px; font-weight: 800; color: var(--ink);
  letter-spacing: -.5px; line-height: 1;
}
.summary-card-sub {
  font-size: 11px; color: var(--ink3); margin-top: 2px;
}
/* 無資料提示 */
.analytics-empty {
  text-align: center; padding: 48px 20px;
  color: var(--ink3); font-size: 14px;
}
.analytics-empty-icon { font-size: 36px; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════
   PRINT MEDIA
═══════════════════════════════════════════════════ */
@media print {
  body { background: white; }
  .topbar, .statstrip, .notice-board, .tabs, .toolbar, .hint-bar, .warn-strip, .section-info,

}

<script>
// ══════════════════════════════════════════════════════════
//  CLOUD SYNC
// ══════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbwJZ1N0SayvqAG76N0TAqocmqm-qOiwUryaLSBEUO-qeGF0vZ-eMs0JWs1z2cTBQGU/exec";

// 本地操作鎖：用戶操作後暫停雲端覆蓋，等待推送完成
let _localLock = false;
let _syncInterval = null;

function setSyncDot(state) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
}

// 設定本地鎖：鎖定期間不讓雲端資料覆蓋本地
function lockLocal(ms = 8000) {
  _localLock = true;
  clearTimeout(lockLocal._t);
  lockLocal._t = setTimeout(() => { _localLock = false; }, ms);
}

async function syncFromCloud() {
  // 本地有未推送完的操作時，跳過這次同步，避免覆蓋
  if (_localLock) return;

  setSyncDot('syncing');
  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    let updated = false;

    if (data.zhongxin_v4) {
      const cloudDB = JSON.parse(data.zhongxin_v4);

function init() {

function ensureTodayEditLog() {
  let e = historyLog.find(h => h.date === todayStr);
  if (!e) {
    e = { date: todayStr, records: {}, editLog: {} };
    historyLog.push(e);
    if (historyLog.length > HISTORY_DAYS) historyLog = historyLog.slice(-HISTORY_DAYS);
  } else if (!e.editLog) { e.editLog = {}; }
}

//  3-DAY WARN DETECTION  ← 核心邏輯說明於下方
// ══════════════════════════════════════════════════════════
function getWarn3Set() {
  const warn = new Set();
  // 只看「已完成重置」的歷史天（排除今天）
  const completed = historyLog
    .filter(h => h.date !== todayStr && h.records && Object.keys(h.records).length > 0)
    .sort((a, b) => a.date < b.date ? -1 : 1);

  // 需要至少 3 天已重置的歷史才能判斷
  if (completed.length < 3) return warn;

  const recent3 = completed.slice(-3); // 最近3天

  Object.keys(db).forEach(n => {
    const missedAll3 = recent3.every(h => {
      const s = h.records[n];
      // 該天：未叫貨 或 根本沒記錄（表示當天也沒叫）
      return !s || s === '未叫貨';
    });
    if (missedAll3) warn.add(n);
  });
  return warn;
}

function snapshotOnReset() {
  const records = {};
  Object.keys(db).forEach(n => { records[n] = db[n].status; });
  let entry = getTodayEntry();
  if (entry) { entry.records = records; }
  else {
    entry = { date: todayStr, records, editLog: {} };
    historyLog.push(entry);
    if (historyLog.length > HISTORY_DAYS) historyLog = historyLog.slice(-HISTORY_DAYS);
  }
  saveHistory();
}

function logEditTime(name, status) {
  const entry = getTodayEntry();
  if (!entry) return;
  if (!entry.editLog) entry.editLog = {};
  if (!entry.editLog[name]) entry.editLog[name] = [];
  const now = new Date();
  const t = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const last = entry.editLog[name].at(-1);
  if (last && last.time === t && last.status === status && last.user === currentUser.name) return;
  entry.editLog[name].push({ time: t, status, user: currentUser.name || '?', icon: currentUser.icon || '👤' });
  saveHistory();
}

// ══════════════════════════════════════════════════════════
//  FILTER BUILD
// ══════════════════════════════════════════════════════════
function buildFixedFilter() {
  const sel = document.getElementById('filter-fixed');
  const cur = sel.value;
  const all = [...new Set(Object.values(db).map(d => d.fixed).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">全部負責人</option>';
  all.forEach(f => {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    if (f === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function renderAll() {
  updateStats();
  renderGrid();
  renderTable();
  renderPrint();
  renderNotices();
  // 只在分析頁面顯示時才渲染（避免效能問題）

}

// ══════════════════════════════════════════════════════════
//  NOTICE BOARD
// ══════════════════════════════════════════════════════════
function renderNotices() {
  const list = document.getElementById('notice-list');
  if (!notices.length) {
    list.innerHTML = '<li class="notice-empty">尚無留言</li>';
    updateNoticeHeader(0, '');
    return;
  }
  const shown = notices.slice(-NOTICE_MAX).reverse();
  list.innerHTML = shown.map(n => `
    <li class="notice-item">
      <span class="notice-author">${esc(n.author||'?')}</span>
      <span class="notice-text">${esc(n.text)}</span>
      <span class="notice-time">${esc(n.time)}</span>
      <button class="notice-del" onclick="deleteNotice('${esc(n.id)}')" title="刪除">✕</button>
    </li>`).join('');

  // 更新標頭預覽（最新一則）
  const latest = shown[0];
  const preview = `${latest.author}：${latest.text}`;
  updateNoticeHeader(shown.length, preview);
}

function updateNoticeHeader(count, preview) {
  const badge   = document.getElementById('notice-badge');
  const previewEl = document.getElementById('notice-preview');
  if (count > 0) {
    badge.textContent = count;
    badge.classList.add('visible');
    previewEl.textContent = preview;
  } else {
    badge.classList.remove('visible');
    previewEl.textContent = '點此展開留言板';
  }
}

let noticeBoardOpen = false;
function toggleNoticeBoard() {
  noticeBoardOpen = !noticeBoardOpen;
  const board = document.getElementById('notice-board');
  board.classList.toggle('open', noticeBoardOpen);
  // 展開時自動 focus 輸入框
  if (noticeBoardOpen) {
    setTimeout(() => document.getElementById('notice-input').focus(), 150);
  }
}

function postNotice() {
  const input  = document.getElementById('notice-input');
  const author = (document.getElementById('notice-author').value || '匿名').trim().slice(0,6);
  const text   = input.value.trim();
  if (!text) { input.focus(); return; }
  const now = new Date();
  const time = String(now.getMonth()+1).padStart(2,'0') + '/' +
               String(now.getDate()).padStart(2,'0') + ' ' +
               String(now.getHours()).padStart(2,'0') + ':' +
               String(now.getMinutes()).padStart(2,'0');
  notices.push({ id: Date.now().toString(36), author, text, time });
  if (notices.length > NOTICE_MAX) notices = notices.slice(-NOTICE_MAX);
  input.value = '';
  saveNotices();
  renderNotices();
  // 儲存暱稱供下次使用
  localStorage.setItem('zhongxin_notice_author', author);
}

function deleteNotice(id) {
  notices = notices.filter(n => n.id !== id);
  saveNotices(); renderNotices();
}

function updateStats() {
  const names = Object.keys(db);
  const tot = names.length;
  const ord = names.filter(n => db[n].status === '有叫貨').length;
  const no  = names.filter(n => db[n].status === '今日不叫貨').length;
  const un  = tot - ord - no;
  const warn3 = getWarn3Set();
  const pct = tot ? Math.round(ord / tot * 100) : 0;

  document.getElementById('c-un').textContent  = un;
  document.getElementById('c-or').textContent  = ord;
  document.getElementById('c-no').textContent  = no;
  document.getElementById('c-warn').textContent = warn3.size;
  document.getElementById('c-tot').textContent  = tot;
  document.getElementById('prog').style.width   = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';

  // ⚠ 警示橫幅
  const warnNames = [...warn3].filter(n => db[n] && db[n].status === '未叫貨');
  const strip = document.getElementById('warn-strip');
  const namesEl = document.getElementById('warn-names');
  if (warnNames.length) {
    strip.classList.add('visible');
    namesEl.innerHTML = warnNames.map(n => `<span class="warn-chip">${esc(n)}</span>`).join('');
  } else {
    strip.classList.remove('visible');
  }
}

// ══════════════════════════════════════════════════════════
//  GRID
// ══════════════════════════════════════════════════════════
// 取得群組內依儲存順序排列的客戶名稱
function getGroupNames(groupName, allNamesInGroup) {
  const saved = groupOrder[groupName] || [];
  // 合併：saved 中有的依序，saved 沒有的（新增的）補到後面
  const savedSet = new Set(saved);
  const ordered = saved.filter(n => allNamesInGroup.includes(n));
  allNamesInGroup.forEach(n => { if (!savedSet.has(n)) ordered.push(n); });
  return ordered;
}

function renderGrid() {
  const q  = (document.getElementById('q-front').value || '').toLowerCase().trim();
  const ff = document.getElementById('filter-fixed').value;
  const container = document.getElementById('grid-container');
  const warn3 = getWarn3Set();

  const fs = document.getElementById('filter-status').value;
  const names = Object.keys(db).filter(n => {
    const d = db[n];
    if (q && !n.toLowerCase().includes(q)) return false;
    if (ff && d.fixed !== ff) return false;
    if (fs === 'warn3') return warn3.has(n) && d.status === '未叫貨';
    if (fs && d.status !== fs) return false;
    return true;
  });

  if (!names.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>查無符合條件的客戶</div>';
    return;
  }

  // 先依 fixed 分組
  const rawGroups = {};
  names.forEach(n => { const g = db[n].fixed || '未分類'; (rawGroups[g] = rawGroups[g] || []).push(n); });

  let html = '';
  Object.keys(rawGroups).sort().forEach(g => {
    const orderedNames = getGroupNames(g, rawGroups[g]);
    const gEsc = esc(g);
    html += `<div class="group-section" data-group="${gEsc}">
      <div class="group-label">${gEsc}<span class="group-count">${orderedNames.length}</span></div>
      <div class="card-grid" data-group="${gEsc}" 
           ondragover="onDragOver(event)" ondrop="onDrop(event,'${gEsc}')">`;
    orderedNames.forEach(n => { html += mkCard(n, warn3); });
    html += '</div></div>';
  });
  container.innerHTML = html;

  // 若拖曳模式啟動中，重新附加拖曳事件
  if (dragMode) attachDragEvents();
}

function mkCard(n, warn3) {
  const d = db[n];
  const isWarn = warn3 && warn3.has(n) && d.status === '未叫貨';
  let cls, lbl;
  if (d.status === '有叫貨')        { cls = 'ordered';   lbl = '已叫貨'; }
  else if (d.status === '今日不叫貨') { cls = 'no-order';  lbl = '不叫'; }
  else if (isWarn)                   { cls = 'warn3';      lbl = '連續未叫'; }
  else                               { cls = 'unordered';  lbl = '未叫貨'; }

  const warnTag = isWarn ? '<span class="warn3-badge">⚠ 連續3天未叫</span>' : '';
  const nn = esc(n);

  // 找出今日最後操作者
  const todayEntry = getTodayEntry();
  const logs = todayEntry?.editLog?.[n] || [];
  const lastLog = logs.at(-1);
  const lastUser = lastLog?.user || '';
  const lastIcon = lastLog?.icon || '';

  return `<div class="ccard ${cls}" data-name="${nn}"
    onclick="toggle('${nn}')" oncontextmenu="rightClick(event,'${nn}')"
    ondragstart="onDragStart(event,'${nn}')" ondragend="onDragEnd(event)">
    ${warnTag}
    <button class="edit-btn" onclick="openEditModal(event,'${nn}')">✏</button>
    <div class="ccard-name">${nn}</div>
    <div class="ccard-foot">
      <span class="ccard-dot"></span>
      <span>${lbl}</span>
      ${lastUser ? `<span style="font-size:11px;" title="${esc(lastUser)}">${esc(lastIcon)} ${esc(lastUser)}</span>` : (d.date ? `<span>${d.date.slice(5)}</span>` : '')}
    </div>
  </div>`;
}

function toggle(n) {
  if (dragMode) return; // 拖曳模式中停用點擊
  if (db[n].status === '未叫貨')     changeStatus(n, '有叫貨');
  else if (db[n].status === '有叫貨') changeStatus(n, '未叫貨');
}
function rightClick(e, n) {
  e.preventDefault();
  if (dragMode) return;
  changeStatus(n, db[n].status === '今日不叫貨' ? '未叫貨' : '今日不叫貨');
}
function changeStatus(n, s) {
  db[n].status = s;
  db[n].date = s === '未叫貨' ? '' : todayStr;
  save(); logEditTime(n, s); renderAll();
  toast(n + ' → ' + s);
}

// ── 拖曳模式 ──────────────────────────────────────────────────────────────
function toggleDragMode() {
  dragMode = !dragMode;
  const btn = document.getElementById('drag-toggle-btn');
  const page = document.getElementById('check-page');
  btn.classList.toggle('active', dragMode);
  page.classList.toggle('drag-mode-active', dragMode);
  if (dragMode) {
    attachDragEvents();
    toast('✏ 排序模式：拖曳卡片調整位置');
  } else {
    toast('✅ 排序已儲存');
  }
}

function attachDragEvents() {
  document.querySelectorAll('.ccard').forEach(el => {
    el.setAttribute('draggable', 'true');
    // 手機 touch 事件
    el.addEventListener('touchstart', onTouchStart, { passive: false });
    el.addEventListener('touchmove',  onTouchMove,  { passive: false });
    el.addEventListener('touchend',   onTouchEnd,   { passive: false });
  });
}

function onDragStart(e, name) {
  if (!dragMode) { e.preventDefault(); return; }
  dragSrcName = name;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', name);
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.ccard.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.ccard.drag-over').forEach(el => el.classList.remove('drag-over'));
  const target = e.target.closest('.ccard');
  if (target && target.dataset.name !== dragSrcName) {
    target.classList.add('drag-over');
  }
}

// ── 手機觸控拖曳 ──────────────────────────────────────────────────────────
let _touchClone = null;   // 拖曳時跟隨手指的複製卡片
let _touchSrc   = null;   // 被拖曳的原始卡片元素
let _touchOffX  = 0;
let _touchOffY  = 0;

function onTouchStart(e) {
  if (!dragMode) return;
  const card = e.currentTarget;
  dragSrcName = card.dataset.name;
  _touchSrc = card;

  const rect = card.getBoundingClientRect();
  const touch = e.touches[0];
  _touchOffX = touch.clientX - rect.left;
  _touchOffY = touch.clientY - rect.top;

  // 建立跟隨手指的視覺複製
  _touchClone = card.cloneNode(true);
  _touchClone.style.cssText = `
    position:fixed; z-index:9999; pointer-events:none; opacity:.85;
    width:${rect.width}px; left:${rect.left}px; top:${rect.top}px;
    border-radius:var(--radius); box-shadow:var(--shadow-lg);
    transition:none;
  `;
  document.body.appendChild(_touchClone);
  card.classList.add('dragging');
  e.preventDefault();
}

function onTouchMove(e) {
  if (!_touchClone || !dragMode) return;
  e.preventDefault();
  const touch = e.touches[0];
  _touchClone.style.left = (touch.clientX - _touchOffX) + 'px';
  _touchClone.style.top  = (touch.clientY - _touchOffY) + 'px';

  // 找出手指下方的目標卡片
  _touchClone.style.display = 'none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  _touchClone.style.display = '';
  document.querySelectorAll('.ccard.drag-over').forEach(c => c.classList.remove('drag-over'));
  const target = el ? el.closest('.ccard') : null;
  if (target && target.dataset.name !== dragSrcName) {
    target.classList.add('drag-over');
  }
}

function onTouchEnd(e) {
  if (!_touchClone || !dragMode) return;
  e.preventDefault();

  // 清理複製元素
  _touchClone.remove(); _touchClone = null;
  if (_touchSrc) { _touchSrc.classList.remove('dragging'); _touchSrc = null; }

  // 找出落點目標
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  document.querySelectorAll('.ccard.drag-over').forEach(c => c.classList.remove('drag-over'));
  const targetCard = el ? el.closest('.ccard') : null;
  const targetName = targetCard ? targetCard.dataset.name : null;

  if (!dragSrcName || !targetName || dragSrcName === targetName) return;

  // 確認同群組
  if (db[dragSrcName]?.fixed !== db[targetName]?.fixed) {
    toast('⚠ 只能在同一負責人群組內調整順序', true); return;
  }

  const group = db[dragSrcName]?.fixed || '未分類';
  const allInGroup = Object.keys(db).filter(n => (db[n].fixed || '未分類') === group);
  let ordered = getGroupNames(group, allInGroup);

  const srcIdx = ordered.indexOf(dragSrcName);
  ordered.splice(srcIdx, 1);
  const newTgtIdx = ordered.indexOf(targetName);
  ordered.splice(newTgtIdx >= 0 ? newTgtIdx : ordered.length, 0, dragSrcName);

  groupOrder[group] = ordered;
  saveOrder();
  renderGrid();
  if (dragMode) attachDragEvents();
}

function onDrop(e, groupName) {
  e.preventDefault();
  document.querySelectorAll('.ccard.drag-over').forEach(el => el.classList.remove('drag-over'));

  const targetCard = e.target.closest('.ccard');
  const targetName = targetCard ? targetCard.dataset.name : null;
  if (!dragSrcName || dragSrcName === targetName) return;

  // 確認兩張卡片在同一群組
  if (db[dragSrcName]?.fixed !== db[targetName]?.fixed &&
      !(db[dragSrcName]?.fixed === undefined && db[targetName]?.fixed === undefined)) {
    toast('⚠ 只能在同一負責人群組內調整順序', true); return;
  }

  // 取得目前排序，將 src 插入到 target 前
  const group = db[dragSrcName]?.fixed || '未分類';
  const allInGroup = Object.keys(db).filter(n => (db[n].fixed || '未分類') === group);
  let ordered = getGroupNames(group, allInGroup);

  const srcIdx = ordered.indexOf(dragSrcName);
  const tgtIdx = ordered.indexOf(targetName);
  if (srcIdx === -1 || tgtIdx === -1) return;

  ordered.splice(srcIdx, 1);
  const newTgtIdx = ordered.indexOf(targetName);
  ordered.splice(newTgtIdx >= 0 ? newTgtIdx : ordered.length, 0, dragSrcName);

  groupOrder[group] = ordered;
  saveOrder();
  renderGrid();
  if (dragMode) attachDragEvents();
}

// ══════════════════════════════════════════════════════════
//  BACKEND TABLE
// ══════════════════════════════════════════════════════════
function renderTable() {
  const q = (document.getElementById('q-back').value || '').toLowerCase().trim();
  const onlyWarn = document.getElementById('chk-warn3').checked;
  const warn3 = getWarn3Set();
  const sortedHist = [...historyLog].sort((a,b) => a.date < b.date ? -1 : 1);
  const pastDates  = sortedHist.map(h => h.date).filter(d => d !== todayStr);
  const todayEntry = getTodayEntry();
  const todayEditLog = todayEntry ? (todayEntry.editLog || {}) : {};

  let thHtml = '<th style="min-width:110px">客戶</th><th>負責人</th>';
  pastDates.forEach(d => {
    thHtml += `<th style="white-space:nowrap;text-align:center;">${d.slice(5)}<br><span style="font-size:10px;color:var(--ink3);font-weight:400;">最終</span></th>`;
  });
  thHtml += '<th style="min-width:190px;">今日操作時間</th><th style="text-align:center;">今日狀態</th><th style="text-align:center;">連續未叫</th><th></th>';
  document.getElementById('history-thead-row').innerHTML = thHtml;

  let html = '';
  Object.keys(db).forEach(n => {
    const d = db[n];
    if (q && !n.toLowerCase().includes(q) && !(d.fixed||'').toLowerCase().includes(q)) return;
    const isWarn = warn3.has(n);
    if (onlyWarn && !isWarn) return;

    let streak = 0;
    for (let i = sortedHist.length-1; i >= 0; i--) {
      const s = sortedHist[i].records && sortedHist[i].records[n];
      if (!s || s === '未叫貨') streak++; else break;
    }

    const bc = d.status === '有叫貨' ? 'ordered' : d.status === '今日不叫貨' ? 'no-order' : (isWarn ? 'warn3' : 'unordered');
    html += `<tr class="${isWarn ? 'row-warn' : ''}">`;
    html += `<td style="font-weight:700;">${isWarn ? '<span style="color:var(--amber);">⚠ </span>' : ''}${esc(n)}</td>`;
    html += `<td style="color:var(--ink2);">${esc(d.fixed||'—')}</td>`;

    pastDates.forEach(dt => {
      const hist = sortedHist.find(h => h.date === dt);
      const s = hist && hist.records ? (hist.records[n] || '—') : '—';
      let cs = 'text-align:center;font-size:12px;', lbl = s;
      if (s === '有叫貨')       { cs += 'color:var(--grn-dk);font-weight:700;'; lbl = '✓'; }
      else if (s === '今日不叫貨') { cs += 'color:var(--blu-dk);'; lbl = '不叫'; }
      else                      { cs += 'color:var(--line);'; lbl = '—'; }
      html += `<td style="${cs}">${lbl}</td>`;
    });

    const logs = todayEditLog[n] || [];
    html += '<td>';
    if (!logs.length) { html += '<span class="tl-empty">尚無記錄</span>'; }
    else {
      html += '<ul class="tl-list">';
      logs.forEach(log => {
        const dc = log.status === '有叫貨' ? 'ordered' : log.status === '今日不叫貨' ? 'no-order' : 'unordered';
        const userIcon = log.icon || '👤';
        const userName = log.user || '—';
        html += `<li class="tl-item">
          <span class="tl-dot ${dc}"></span>
          <span class="tl-time">${esc(log.time)}</span>
          <span class="tl-status">${esc(log.status)}</span>
          <span class="tl-user" style="background:var(--line2);border-radius:99px;padding:1px 7px;font-size:10px;font-weight:600;color:var(--ink2);margin-left:2px;">${esc(userIcon)} ${esc(userName)}</span>
        </li>`;
      });
      html += '</ul>';
    }
    html += '</td>';

    html += `<td style="text-align:center;"><span class="badge ${bc}">${d.status}</span></td>`;
    html += '<td style="text-align:center;">';
    if (isWarn)      html += `<span class="warn-pill">⚠ ${streak}天</span>`;
    else if (streak) html += `<span style="font-size:12px;color:var(--ink3);">${streak}天</span>`;
    else             html += '<span style="color:var(--line);">—</span>';
    html += '</td>';

    const nn = esc(n);
    html += `<td style="white-space:nowrap;">
      <button class="btn btn-ghost btn-sm" onclick="openEditModal(null,'${nn}')">編輯</button>
      <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="confirmDeleteHistory('${nn}')">刪除</button>
    </td></tr>`;
  });

  const colSpan = 4 + pastDates.length + 2;
  document.getElementById('backend-tbody').innerHTML = html ||
    `<tr><td colspan="${colSpan}" style="text-align:center;color:var(--ink3);padding:32px">查無資料</td></tr>`;
}

function confirmDeleteHistory(n) {
  showConfirm('確定刪除客戶「' + n + '」？\n同時清除其所有歷史記錄。', () => {
    historyLog.forEach(h => {
      if (h.records) delete h.records[n];
      if (h.editLog) delete h.editLog[n];
    });
    delete db[n];
    buildFixedFilter(); save(); saveHistory(); renderAll();
    toast('已刪除 ' + n);
  });
}

// ══════════════════════════════════════════════════════════
//  PRINT
// ══════════════════════════════════════════════════════════
let importedWbData = null;
function renderPrint() { importedWbData ? renderPrintFromExcel() : renderPrintDefault(); }

function renderPrintDefault() {
  // 未匯入 Excel 時，顯示提示而非預設表格
  document.getElementById('print-table').innerHTML = '';
  const wrap = document.getElementById('print-placeholder');
  if (wrap) wrap.style.display = 'flex';
}

function importExcel(input) {
  const file = input.files[0]; if (!file) return;
  const statusEl = document.getElementById('import-status');
  statusEl.style.display='block'; statusEl.textContent='讀取中…';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      // 保留原始 arrayBuffer，匯出時直接在原始 workbook 上改，才能保住格式
      const rawBuf = e.target.result;
      const wb = XLSX.read(new Uint8Array(rawBuf), {
        type: 'array',
        cellStyles: true,   // 保留儲存格樣式
        cellNF: true,       // 保留數字格式
        cellDates: true,    // 保留日期格式
      });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
      if (!rows.length) { statusEl.textContent='⚠ 檔案無資料'; return; }
      const headerRow = rows[0];
      const todayDay  = today.getDate();
      const todayColIndices = [];
      headerRow.forEach((v,i) => { if (v===todayDay) todayColIndices.push(i); });
      if (!todayColIndices.length) { statusEl.textContent=`⚠ 找不到今日（${todayDay}日）欄位`; return; }
      // 同時保留原始 wb 物件，供匯出時直接修改使用
      importedWbData = { rows, todayColIndices, headerRow, wb, wsName: wb.SheetNames[0] };
      document.getElementById('btn-export-excel').style.display='inline-flex';
      statusEl.style.color='var(--grn)';
      statusEl.textContent=`✅ 已載入「${file.name}」，今日（${todayDay}日）識別 ${todayColIndices.length} 個欄`;
      renderPrintFromExcel();
    } catch(err) { statusEl.style.color='var(--red)'; statusEl.textContent='⚠ '+err.message; }
  };
  reader.readAsArrayBuffer(file); input.value='';
}

function renderPrintFromExcel() {
  const ph = document.getElementById('print-placeholder');
  if (ph) ph.style.display = 'none';
  const { rows, todayColIndices, headerRow } = importedWbData;
  const CPG=7, warn3=getWarn3Set();
  const ordSet = new Set(Object.keys(db).filter(n => db[n].status==='有叫貨'));
  let html='<thead><tr>';
  headerRow.forEach((v,c) => {
    const it = todayColIndices.includes(c);
    html += `<th style="${it?'background:#dbeafe;':''}">${esc(v!=null?String(v):'')}</th>`;
  });
  html += '</tr></thead><tbody>';
  for (let r=1;r<rows.length;r++) {
    const row=rows[r]; if(!row||row.every(v=>v===null)) continue;
    html+='<tr>';
    for (let c=0;c<row.length;c++) {
      const v=row[c], it=todayColIndices.includes(c), in_=c%CPG===0;
      let ct='', cs='';
      if (in_&&v) {
        const cn=String(v), iw=warn3.has(cn)&&db[cn]&&db[cn].status==='未叫貨';
        ct=(iw?'⚠ ':'')+esc(cn);
        cs='font-weight:600;text-align:left;padding-left:6px;white-space:nowrap;'+(iw?'background:#fffbeb;color:var(--amber-dk);':'');
      } else if (it) {
        let cn=null;
        for (let nc=c-1;nc>=0;nc--) { if(nc%CPG===0&&row[nc]!=null){cn=String(row[nc]);break;} }
        if(cn&&ordSet.has(cn)){ct='V';cs='font-weight:700;color:var(--grn);background:var(--grn-bg)';} else cs='background:var(--blu-bg);';
      }
      html+=`<td style="${cs}">${ct}</td>`;
    }
    html+='</tr>';
  }
  document.getElementById('print-table').innerHTML=html+'</tbody>';
}

function exportExcel() {
  if (!importedWbData) return;
  const { rows, todayColIndices, wb, wsName } = importedWbData;
  const CPG = 7;
  const ordSet = new Set(Object.keys(db).filter(n => db[n].status === '有叫貨'));

  // 直接操作原始 worksheet，不重建，才能保住儲存格格式、合併、樣式
  const ws = wb.Sheets[wsName];

  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (!row) continue;
    for (const c of todayColIndices) {
      // 找到同列最近一個名稱欄
      let cn = null;
      for (let nc = c - 1; nc >= 0; nc--) {
        if (nc % CPG === 0 && row[nc] != null) { cn = String(row[nc]); break; }
      }
      // 將 Excel 欄列索引轉成儲存格位址 (e.g. r=1,c=3 → D2)
      const cellAddr = XLSX.utils.encode_cell({ r: r, c: c });
      if (cn && ordSet.has(cn)) {
        // 有叫貨：寫入 "V"，保留原有儲存格其他屬性（格式、樣式）
        if (!ws[cellAddr]) ws[cellAddr] = {};
        ws[cellAddr].v = 'V';   // 值
        ws[cellAddr].t = 's';   // 類型：string
        // 如果原始儲存格有樣式物件，保留它；否則不覆蓋
      } else {
        // 未叫貨：清空該格的值（保留儲存格物件讓格式留著）
        if (ws[cellAddr]) {
          ws[cellAddr].v = '';
          ws[cellAddr].t = 's';
        }
      }
    }
  }

  const ds = today.getFullYear() +
    String(today.getMonth()+1).padStart(2,'0') +
    String(today.getDate()).padStart(2,'0');

  // 用 bookType:'xlsx' 寫出，保留所有原始格式
  XLSX.writeFile(wb, '打勾單_' + ds + '.xlsx', { bookType: 'xlsx', type: 'binary' });
  toast('✅ Excel 已匯出（原始格式保留）');
}

function saveClient() {
  const name=document.getElementById('m-name').value.trim();
  const status=document.getElementById('m-status').value;
  const fixed=document.getElementById('m-fixed').value.trim();
  const dateStr=(document.getElementById('m-date').value||'').replace(/-/g,'/');
  if (!name) { alert('請輸入客戶名稱'); return; }

  if (editing) {
    if (name!==editing && db[name]) { alert('該名稱已存在'); return; }
    if (name!==editing) {
      db[name]={...db[editing]};
      delete db[editing];
      historyLog.forEach(h=>{
        if(h.records&&h.records[editing]!==undefined){h.records[name]=h.records[editing];delete h.records[editing];}
        if(h.editLog&&h.editLog[editing]!==undefined){h.editLog[name]=h.editLog[editing];delete h.editLog[editing];}
      });
    }
    db[name].status=status; db[name].fixed=fixed;
    db[name].date=status==='未叫貨'?'':(dateStr||todayStr);
  } else {
    if (db[name]) { alert('該名稱已存在'); return; }
    db[name]={ status, date:status!=='未叫貨'?(dateStr||todayStr):'', fixed };
  }
  closeModal(); buildFixedFilter(); save(); saveHistory(); renderAll();
  toast('✅ 儲存成功');
}

function deleteClient() {
  if (!editing) return;
  showConfirm('確定刪除「'+editing+'」？', ()=>{
    historyLog.forEach(h=>{
      if(h.records) delete h.records[editing];
      if(h.editLog) delete h.editLog[editing];
    });
    delete db[editing]; closeModal();
    buildFixedFilter(); save(); saveHistory(); renderAll();
    toast('已刪除 '+editing);
  });
}

// ══════════════════════════════════════════════════════════
//  ANALYTICS
// ══════════════════════════════════════════════════════════
let analyticsYear  = today.getFullYear();
let analyticsMonth = today.getMonth(); // 0-indexed

function analyticsChangeMonth(delta) {
  analyticsMonth += delta;
  if (analyticsMonth < 0)  { analyticsMonth = 11; analyticsYear--; }
  if (analyticsMonth > 11) { analyticsMonth = 0;  analyticsYear++; }
  renderAnalytics();
}

function renderAnalytics() {
  const y = analyticsYear, m = analyticsMonth;
  const monthStr = `${y}年 ${m+1}月`;
  document.getElementById('analytics-month-label').textContent = monthStr;

  // 取得該月所有日期的資料
  // historyLog: [{date:'2025/07/01', records:{name:status}}, ...]
  // 今日資料從 db 直接取
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const dayData = []; // [{date, ord, un, no, total}]

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}/${String(m+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
    let ord=0, un=0, no=0;

    if (dateStr === todayStr) {
      // 今日：從當前 db 取
      Object.values(db).forEach(v => {
        if (v.status === '有叫貨')     ord++;
        else if (v.status === '今日不叫貨') no++;
        else un++;
      });
    } else {
      // 歷史：從 historyLog 取
      const entry = historyLog.find(h => h.date === dateStr);
      if (entry && entry.records) {
        const total = Object.keys(db).length;
        Object.values(entry.records).forEach(s => {
          if (s === '有叫貨')     ord++;
          else if (s === '今日不叫貨') no++;
          else un++;
        });
        // 有些客戶可能沒有記錄，視為未叫貨
        const recorded = ord + un + no;
        un += Math.max(0, total - recorded);
      } else {
        // 無資料的日期跳過（未來的日期或沒有重置的日期）
        dayData.push({ date: dateStr, day: d, ord: null, un: null, no: null, total: null });
        continue;
      }
    }
    const total = ord + un + no;
    dayData.push({ date: dateStr, day: d, ord, un, no, total });
  }

  const validDays = dayData.filter(d => d.total !== null);

  // ── 摘要卡片 ──────────────────────────────────────────
  const totalOrd = validDays.reduce((s, d) => s + d.ord, 0);
  const avgOrd   = validDays.length ? Math.round(totalOrd / validDays.length) : 0;
  const maxOrd   = validDays.length ? Math.max(...validDays.map(d => d.ord)) : 0;
  const todayData = dayData.find(d => d.date === todayStr);
  const todayOrd  = todayData?.ord ?? 0;
  const todayPct  = todayData?.total ? Math.round(todayOrd / todayData.total * 100) : 0;

  document.getElementById('analytics-summary').innerHTML = `
    <div class="summary-card">
      <div class="summary-card-label"><span style="color:var(--grn)">●</span> 今日已叫貨</div>
      <div class="summary-card-val" style="color:var(--grn-dk)">${todayOrd}</div>
      <div class="summary-card-sub">共 ${todayData?.total ?? 0} 家・${todayPct}%</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-label"><span style="color:var(--red)">●</span> 今日未叫貨</div>
      <div class="summary-card-val" style="color:var(--red-dk)">${todayData?.un ?? 0}</div>
      <div class="summary-card-sub">今日不叫 ${todayData?.no ?? 0} 家</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-label"><span style="color:var(--accent)">●</span> 月平均叫貨</div>
      <div class="summary-card-val" style="color:var(--accent)">${avgOrd}</div>
      <div class="summary-card-sub">共 ${validDays.length} 天資料</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-label"><span style="color:var(--amber)">●</span> 單日最高叫貨</div>
      <div class="summary-card-val" style="color:var(--amber-dk)">${maxOrd}</div>
      <div class="summary-card-sub">本月峰值</div>
    </div>`;

  if (!validDays.length) {
    document.getElementById('analytics-chart').innerHTML =
      '<div class="analytics-empty"><div class="analytics-empty-icon">📭</div>本月尚無叫貨記錄<br><small style="color:var(--ink3);font-size:12px;margin-top:6px;display:block;">每日按「重置今日」後才會記錄當天快照</small></div>';
    document.getElementById('analytics-table').innerHTML = '';
    return;
  }

  // ── SVG 折線圖 ──────────────────────────────────────
  renderLineChart(dayData, daysInMonth);

  // ── 每日明細表 ──────────────────────────────────────
  renderAnalyticsTable(dayData);
}

function renderLineChart(dayData, daysInMonth) {
  const W = Math.max(600, daysInMonth * 28);
  const H = 220;
  const PAD = { top: 20, right: 20, bottom: 36, left: 44 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;

  const validDays = dayData.filter(d => d.total !== null);
  if (!validDays.length) return;

  const maxVal = Math.max(...validDays.map(d => Math.max(d.ord, d.un, d.no)), 1);
  // 讓 Y 軸最大值稍大，留白
  const yMax = Math.ceil(maxVal * 1.15 / 10) * 10 || 10;

  const xPos = d => PAD.left + ((d.day - 1) / (daysInMonth - 1 || 1)) * cW;
  const yPos = v => PAD.top + cH - (v / yMax) * cH;

  // Y 軸格線
  const yTicks = 4;
  let gridLines = '', yLabels = '';
  for (let i = 0; i <= yTicks; i++) {
    const v = Math.round(yMax * i / yTicks);
    const y = yPos(v);
    gridLines += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    yLabels  += `<text x="${PAD.left - 6}" y="${y+4}" text-anchor="end" font-size="10" fill="#9ca3af">${v}</text>`;
  }

  // X 軸標籤（每 5 天顯示一次）
  let xLabels = '';
  dayData.forEach(d => {
    if (d.day === 1 || d.day % 5 === 0 || d.day === daysInMonth) {
      xLabels += `<text x="${xPos(d)}" y="${H - PAD.bottom + 16}" text-anchor="middle" font-size="10" fill="#9ca3af">${d.day}</text>`;
    }
  });

  // 折線 + 資料點產生器
  function makePath(key, color) {
    const pts = validDays.map(d => `${xPos(d)},${yPos(d[key])}`);
    const path = `M${pts.join(' L')}`;
    // 面積填色
    const first = validDays[0], last = validDays.at(-1);
    const area  = `M${xPos(first)},${yPos(0)} L${pts.join(' L')} L${xPos(last)},${yPos(0)} Z`;
    let dots = '';
    validDays.forEach(d => {
      dots += `<circle cx="${xPos(d)}" cy="${yPos(d[key])}" r="3" fill="${color}" stroke="white" stroke-width="1.5">
        <title>${d.date.slice(5)}：${d[key]} 家</title>
      </circle>`;
    });
    return `
      <path d="${area}" fill="${color}" fill-opacity=".08"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}`;
  }

  // 今日標示線
  const todayEntry = dayData.find(d => d.date === todayStr);
  let todayLine = '';
  if (todayEntry) {
    const tx = xPos(todayEntry);
    todayLine = `<line x1="${tx}" y1="${PAD.top}" x2="${tx}" y2="${H-PAD.bottom}" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
      <text x="${tx}" y="${PAD.top - 5}" text-anchor="middle" font-size="9" fill="#6366f1" font-weight="600">今日</text>`;
  }

  const svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif">
    ${gridLines}
    ${yLabels}
    ${xLabels}
    <text x="${PAD.left + cW/2}" y="${H}" text-anchor="middle" font-size="11" fill="#9ca3af">日期</text>
    ${makePath('ord', '#10b981')}
    ${makePath('un',  '#ef4444')}
    ${makePath('no',  '#3b82f6')}
    ${todayLine}
  </svg>`;

  document.getElementById('analytics-chart').innerHTML = svg;
}

function renderAnalyticsTable(dayData) {
  const validDays = dayData.filter(d => d.total !== null).reverse(); // 最新在前
  let html = `<thead><tr style="background:var(--page);">
    <th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--ink3);border-bottom:1px solid var(--line);white-space:nowrap;">日期</th>
    <th style="padding:8px 12px;text-align:center;font-size:11px;font-weight:600;color:#10b981;border-bottom:1px solid var(--line);">已叫貨</th>
    <th style="padding:8px 12px;text-align:center;font-size:11px;font-weight:600;color:#ef4444;border-bottom:1px solid var(--line);">未叫貨</th>
    <th style="padding:8px 12px;text-align:center;font-size:11px;font-weight:600;color:#3b82f6;border-bottom:1px solid var(--line);">今日不叫</th>
    <th style="padding:8px 12px;text-align:center;font-size:11px;font-weight:600;color:var(--ink3);border-bottom:1px solid var(--line);">總計</th>
    <th style="padding:8px 12px;text-align:center;font-size:11px;font-weight:600;color:var(--ink3);border-bottom:1px solid var(--line);">叫貨率</th>
  </tr></thead><tbody>`;

  validDays.forEach(d => {
    const isToday = d.date === todayStr;
    const pct = d.total ? Math.round(d.ord / d.total * 100) : 0;
    const rowBg = isToday ? 'background:#eef2ff;' : '';
    html += `<tr style="${rowBg}">
      <td style="padding:7px 12px;border-bottom:1px solid var(--line2);font-weight:${isToday?700:400};color:${isToday?'var(--accent)':'var(--ink)'};">
        ${d.date.slice(5)}${isToday ? ' <span style="font-size:10px;color:var(--accent);">(今日)</span>' : ''}
      </td>
      <td style="padding:7px 12px;text-align:center;border-bottom:1px solid var(--line2);font-weight:700;color:#065f46;">${d.ord}</td>
      <td style="padding:7px 12px;text-align:center;border-bottom:1px solid var(--line2);color:#9f1239;">${d.un}</td>
      <td style="padding:7px 12px;text-align:center;border-bottom:1px solid var(--line2);color:#1e3a8a;">${d.no}</td>
      <td style="padding:7px 12px;text-align:center;border-bottom:1px solid var(--line2);color:var(--ink2);">${d.total}</td>
      <td style="padding:7px 12px;text-align:center;border-bottom:1px solid var(--line2);">
        <div style="display:flex;align-items:center;gap:6px;justify-content:center;">
          <div style="width:50px;height:5px;background:var(--line2);border-radius:99px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:#10b981;border-radius:99px;"></div>
          </div>
          <span style="font-size:12px;font-weight:600;color:${pct>=80?'var(--grn-dk)':pct>=50?'var(--ink2)':'var(--red-dk)'};">${pct}%</span>
        </div>
      </td>
    </tr>`;
  });
  html += '</tbody>';
  document.getElementById('analytics-table').innerHTML = html;
}

// ══════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
let _t;
function toast(msg, isErr) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=isErr?'var(--red)':'var(--ink)';
  el.classList.add('show'); clearTimeout(_t);
  _t=setTimeout(()=>el.classList.remove('show'),2500);
}

// ══════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════
window.addEventListener('load', ()=>{
  syncFromCloud();
  _syncInterval = setInterval(syncFromCloud, 6000); // 6秒同步一次
});
init();
</script>
</body>
</html>
